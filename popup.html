<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --card: #ffffff;
      --ink: #1c1c1f;
      --muted: #6b6b72;
      --accent: #2f6fed;
      --accent-2: #6aa5ff;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Avenir Next", "Avenir", "Helvetica Neue", system-ui, sans-serif;
      width: 300px;
      padding: 16px;
      color: var(--ink);
      background: var(--bg);
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 14px 14px 10px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .title {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.2px;
      margin-bottom: 4px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
    }

    .muted {
      font-size: 12px;
      color: var(--muted);
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      background: #fff;
      font-size: 13px;
    }

    .value {
      font-size: 12px;
      color: var(--muted);
      min-width: 46px;
      text-align: right;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d6d7dd;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      transition: all 0.2s ease;
    }

    .switch input:checked + .slider {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }

    .divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.06);
      margin: 8px 0 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Better YouTube Captions</div>
    <div class="hint">Tune the overlay and keep it consistent across videos.</div>

    <div class="row">
      <div>
        <label for="toggle">Enable Captions</label>
        <div class="muted">Turn the overlay on or off.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="stack">
      <label for="lang">Caption Language</label>
      <select id="lang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="auto">Auto-detect</option>
      </select>
    </div>

    <div class="stack">
      <label for="style">Caption Style</label>
      <select id="style">
        <option value="glass">Glass</option>
        <option value="classic-yellow">Classic Yellow</option>
        <option value="cinema">Cinema</option>
        <option value="minimal">Minimal</option>
        <option value="neon">Neon</option>
        <option value="subtitle-bar">Subtitle Bar</option>
        <option value="outline">Outline</option>
      </select>
    </div>

    <div class="stack">
      <div class="row" style="margin-bottom: 0;">
        <label for="font_size">Caption Size</label>
        <span class="value" id="font_size_value">28px</span>
      </div>
      <input type="range" id="font_size" min="16" max="48" step="1">
    </div>

    <div class="stack">
      <div class="row" style="margin-bottom: 0;">
        <label for="bottom_offset">Caption Position</label>
        <span class="value" id="bottom_offset_value">10%</span>
      </div>
      <input type="range" id="bottom_offset" min="5" max="25" step="1">
    </div>

    <div class="stack">
      <div class="row" style="margin-bottom: 0;">
        <label for="bg_opacity">Background Opacity</label>
        <span class="value" id="bg_opacity_value">45%</span>
      </div>
      <input type="range" id="bg_opacity" min="0" max="80" step="1">
    </div>

    <div class="stack">
      <label for="text_color">Text Color</label>
      <select id="text_color">
        <option value="auto">Auto</option>
        <option value="#ffffff">White</option>
        <option value="#ffd700">Yellow</option>
        <option value="#a7f3ff">Cyan</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div>
        <label for="hide_native">Hide YouTube Captions</label>
        <div class="muted">Avoid double captions.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="hide_native">
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <div>
        <label for="hide_button">Hide On-screen Button</label>
        <div class="muted">Keep the player clean.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="hide_button">
        <span class="slider"></span>
      </label>
    </div>

    <div class="row" style="margin-bottom: 0;">
      <div>
        <label for="force_refresh">Force Full Refresh</label>
        <div class="muted">Use this if captions fail after navigation.</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="force_refresh">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
