<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 14px;
      color: #333;
    }
    .row {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 13px;
    }
    input[type="checkbox"] {
      margin-right: 8px;
    }
    select,
    input[type="range"] {
      width: 100%;
    }
    select {
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 10px;
      color: #1a73e8;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: -6px;
      margin-bottom: 10px;
    }
    .value {
      font-size: 12px;
      color: #555;
      min-width: 36px;
      text-align: right;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="title">Better YouTube Captions</div>
  <div class="hint">Customize the overlay and behavior.</div>

  <div class="row">
    <label><input type="checkbox" id="toggle"> Enable Captions</label>
  </div>

  <div class="row" style="flex-direction: column; align-items: stretch;">
    <label for="lang">Caption Language</label>
    <select id="lang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh">Chinese</option>
      <option value="auto">Auto-detect</option>
    </select>
  </div>

  <div class="row" style="flex-direction: column; align-items: stretch;">
    <div class="row" style="margin-bottom: 4px;">
      <label for="font_size">Caption Size</label>
      <span class="value" id="font_size_value">28px</span>
    </div>
    <input type="range" id="font_size" min="16" max="48" step="1">
  </div>

  <div class="row" style="flex-direction: column; align-items: stretch;">
    <div class="row" style="margin-bottom: 4px;">
      <label for="bottom_offset">Caption Position</label>
      <span class="value" id="bottom_offset_value">10%</span>
    </div>
    <input type="range" id="bottom_offset" min="5" max="25" step="1">
  </div>

  <hr>

  <div class="row">
    <label><input type="checkbox" id="hide_button"> Hide On-screen Button</label>
  </div>

  <div class="row">
    <label><input type="checkbox" id="force_refresh"> Force Full Refresh on New Videos</label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
